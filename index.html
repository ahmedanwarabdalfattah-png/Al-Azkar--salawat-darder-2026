<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a4a3a">
<title>الصلوات والأذكار</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--g1:#1a4a3a;--g2:#2d6b55;--g3:#3d8b6e;--gp:#e8f5f0;--gold:#c9a84c;--goldl:#e8c97a;--cream:#faf8f3;--card:#fff;--sh:0 4px 20px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Naskh Arabic','Amiri',serif;background:var(--cream);min-height:100vh;direction:rtl;overflow-x:hidden}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;display:flex;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,0.08)}
.nav-btn{flex:1;padding:10px 4px 14px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Noto Naskh Arabic',serif;font-size:11px;color:#888;transition:color 0.2s}
.nav-btn.active{color:var(--g2)}
.nav-icon{font-size:22px}

/* HEADER */
.header{background:linear-gradient(135deg,var(--g1),var(--g2) 60%,var(--g3));padding:14px 18px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.25)}
.header-title{color:#fff;font-family:'Amiri',serif;font-size:22px;font-weight:700;text-align:center}
.header-sub{color:var(--goldl);font-size:12px;text-align:center;margin-top:2px}
.progress-wrap{height:3px;background:rgba(255,255,255,0.2);margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--goldl));transition:width 0.4s}

/* TABS */
.tabs-wrap{background:var(--g1);overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;min-width:max-content;padding:0 8px}
.tab-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-family:'Noto Naskh Arabic',serif;font-size:13px;padding:10px 14px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.2s}
.tab-btn.active{color:var(--goldl);border-bottom-color:var(--gold);font-weight:600}

/* STATS */
.stats{background:var(--gp);padding:9px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,0,0,0.06)}
.stats-txt{font-size:13px;color:var(--g2);font-weight:600}
.reset-btn{background:none;border:1px solid var(--g2);color:var(--g2);padding:4px 12px;border-radius:20px;font-family:'Noto Naskh Arabic',serif;font-size:12px;cursor:pointer}

/* PAGES */
.page{display:none;padding:14px 14px 80px}
.page.active{display:block}

/* COUNTER CARDS */
.card{background:#fff;border-radius:14px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,0.04);overflow:hidden;transition:all 0.2s}
.card.done{border-color:rgba(61,139,110,0.3);background:linear-gradient(135deg,#fff,#f0faf6)}
.card-body{padding:18px 18px 14px}
.zikr-txt{font-family:'Amiri',serif;font-size:20px;line-height:2;color:#1a1a1a;text-align:center}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(0,0,0,0.02);border-top:1px solid rgba(0,0,0,0.05)}
.cnt-info{font-size:13px;color:#888}
.cnt-info span{color:var(--g2);font-weight:700;font-size:15px}
.counter-area{display:flex;align-items:center;gap:10px}
.cnt-disp{font-size:18px;font-weight:700;color:var(--g1);min-width:24px;text-align:center}
.cnt-btn{width:50px;height:50px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(45,107,85,0.35);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform 0.1s}
.cnt-btn:active{transform:scale(0.88)}
.cnt-btn.done-btn{background:linear-gradient(135deg,#4caf50,#2e7d32)}
.done-badge{display:none;background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.card.done .done-badge{display:inline-block}
.cat-hdr{text-align:center;padding:8px 0 2px;margin-bottom:2px}
.cat-name{font-family:'Amiri',serif;font-size:19px;color:var(--g1);font-weight:700}
.cat-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:6px auto 0;width:55%}
@keyframes ripple{to{transform:scale(4);opacity:0}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);width:20px;height:20px;margin:-10px 0 0 -10px;animation:ripple 0.5s linear;pointer-events:none}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.card.pop{animation:pulse 0.35s ease}

/* FEED */
.feed-card{background:#fff;border-radius:16px;margin-bottom:16px;box-shadow:var(--sh);overflow:hidden;border:1px solid rgba(0,0,0,0.04)}
.feed-head{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.feed-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g1));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.feed-meta{flex:1}
.feed-cat{font-size:13px;font-weight:700;color:var(--g1)}
.feed-time{font-size:11px;color:#aaa}
.feed-body{padding:0 16px 14px}
.feed-txt{font-family:'Amiri',serif;font-size:19px;line-height:1.9;color:#1a1a1a}
.feed-actions{display:flex;align-items:center;gap:0;border-top:1px solid #f0f0f0;padding:8px 16px}
.feed-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-family:'Noto Naskh Arabic',serif;font-size:13px;color:#888;transition:all 0.2s}
.feed-btn:active{background:#f5f5f5}
.feed-btn.liked{color:#e53935}
.feed-btn.shared{color:var(--g2)}
.feed-count-badge{background:var(--gp);color:var(--g2);padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.feed-btn.liked .feed-icon{animation:heartPop 0.3s ease}

/* CALENDAR */
.cal-wrap{background:#fff;border-radius:16px;box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.cal-header{background:linear-gradient(135deg,var(--g1),var(--g2));padding:16px;display:flex;align-items:center;justify-content:space-between}
.cal-title{color:#fff;font-family:'Amiri',serif;font-size:20px;font-weight:700}
.cal-nav{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-grid{padding:12px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:11px;color:#888;padding:4px 0;font-weight:600}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;cursor:pointer;transition:all 0.2s;position:relative}
.cal-day.empty{background:none}
.cal-day.today{border:2px solid var(--g2);font-weight:700;color:var(--g2)}
.cal-day.completed{background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;font-weight:700}
.cal-day.partial{background:var(--gp);color:var(--g2);font-weight:600}
.cal-day.future{color:#ccc}
.cal-legend{display:flex;gap:16px;padding:8px 12px 14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.legend-dot{width:12px;height:12px;border-radius:50%}

/* Streak */
.streak-box{background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:16px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-around;text-align:center}
.streak-item{color:#fff}
.streak-num{font-size:32px;font-weight:700;font-family:'Amiri',serif;color:var(--goldl)}
.streak-lbl{font-size:12px;opacity:0.8;margin-top:2px}

.all-done{text-align:center;padding:30px 20px;display:none}
.all-done.show{display:block}
</style>
</head>
<body>

<div id="pg-counter" class="page active">
  <div class="header">
    <div class="header-title">الصلوات والأذكار</div>
    <div class="header-sub">اللهم صل وسلم وبارك على سيدنا محمد</div>
    <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  </div>
  <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
  <div class="stats">
    <div class="stats-txt" id="stxt">جاري التحميل...</div>
    <button class="reset-btn" onclick="resetAll()">إعادة تعيين</button>
  </div>
  <div style="padding:14px 14px 80px">
    <div class="all-done" id="allDone">
      <div style="font-size:56px;margin-bottom:12px">🌙</div>
      <div style="font-family:'Amiri',serif;font-size:26px;color:var(--g1);margin-bottom:6px">أحسنت! اكتملت جميع الأذكار</div>
      <div style="color:#888">تقبّل الله منا ومنكم</div>
    </div>
    <div id="cards"></div>
  </div>
</div>

<div id="pg-feed" class="page">
  <div class="header">
    <div class="header-title">تدفق الأذكار</div>
    <div class="header-sub">اقرأ وتفاعل مع الأذكار</div>
  </div>
  <div style="padding:14px 14px 80px" id="feed"></div>
</div>

<div id="pg-cal" class="page">
  <div class="header">
    <div class="header-title">متابعة الإنجاز</div>
    <div class="header-sub">سجل يومياتك من الأذكار</div>
  </div>
  <div style="padding:14px 14px 80px">
    <div class="streak-box">
      <div class="streak-item"><div class="streak-num" id="streak">0</div><div class="streak-lbl">أيام متتالية</div></div>
      <div class="streak-item"><div class="streak-num" id="totalDays">0</div><div class="streak-lbl">إجمالي الأيام</div></div>
      <div class="streak-item"><div class="streak-num" id="bestStreak">0</div><div class="streak-lbl">أفضل سلسلة</div></div>
    </div>
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" onclick="changeMonth(1)">▶</button>
      </div>
      <div class="cal-grid">
        <div class="cal-days-header">
          <div class="cal-day-name">أح</div><div class="cal-day-name">إث</div>
          <div class="cal-day-name">ثل</div><div class="cal-day-name">أر</div>
          <div class="cal-day-name">خم</div><div class="cal-day-name">جم</div>
          <div class="cal-day-name">سب</div>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>
      <div class="cal-legend">
        <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,var(--g2),var(--g1))"></div>مكتمل</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--gp);border:1px solid var(--g2)"></div>جزئي</div>
        <div class="legend-item"><div class="legend-dot" style="border:2px solid var(--g2)"></div>اليوم</div>
      </div>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('counter',this)"><span class="nav-icon">📿</span>العداد</button>
  <button class="nav-btn" onclick="showPage('feed',this)"><span class="nav-icon">📜</span>التدفق</button>
  <button class="nav-btn" onclick="showPage('cal',this)"><span class="nav-icon">📅</span>المتابعة</button>
</nav>

<script>
const DATA = [
  {id:"a1",cat:"الاستعاذات",zekr:"أَعُوذُ بِاللَّهِ مِنَ الشَّيطَانِ الرَّجِيمِ",count:1},
  {id:"a2",cat:"أذكار مستهلة",zekr:"بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ",count:1},
  {id:"a3",cat:"أذكار مستهلة",zekr:"رَبِّ أَعُوذُ بِكَ مِنْ هَمْزَاتِ الشَّيَاطِينِ وَأَعُوذُ بِكَ رَبِّ أَنْ يَحْضَرُون",count:1},
  {id:"a4",cat:"أذكار مستهلة",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ . وَأَعُوذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ . وَأَعُوذُ بِكَ مِنَ الْجُبْنِ وَالْبُخْلِ . وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ وَقَهْرِ الرِّجَالِ",count:3},
  {id:"a5",cat:"أذكار مستهلة",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْفَقْرِ وَالْعَيْلَةِ وَأَعُوذُ بِكَ مِنْ كُلِّ بَلِيَّةٍ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْفَقْرِ إِلَّا إِلَيْكَ. وَمِنَ الذُّلِّ إِلَّا لَكَ . وَمِنَ الْخَوْفِ إِلَّا مِنْكَ",count:1},
  {id:"a6",cat:"أذكار مستهلة",zekr:"وَأَعُوذُ بِكَ أَنْ أَقُولَ زُورَاً.أَوْ أَغْشَى فُجُورَاً . أَوْ أَكُونَ بِكَ مَغْرُورَاً",count:1},
  {id:"a7",cat:"الاستعاذات",zekr:"وَأَعُوذُ بِكَ مِنْ شَمَاتَةِ الْأَعْدَاءِ وَعُضَالِ الدَّاءِ وَخَيْبَةِ الرَّجَاءِ وَزَوالِ النِّعْمَةِ وَفُجَاءَةِ النِّقْمَةِ",count:1},
  {id:"a8",cat:"الاستعاذات",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ الْخَلْقِ وَهَمِّ الرِّزْقِ وَسُوءِ الْخُلْقِ",count:1},
  {id:"a9",cat:"الاستعاذات",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْعَطَبِ وَالنَّصَبِ.وَأَعوذُ بِكَ مِنْ وَعْثَاءِ السَّفَرِ وَسُوءِ الْمُنْقَلَبِ",count:1},
  {id:"a10",cat:"الاستعاذات",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الزِّيفِ وَالْجَزَعِ . وَأَعُوذُ بِكَ مِنَ الطَّمَعِ فِي غَيْرِ مَطْمَعٍ",count:1},
  {id:"a11",cat:"الاستعاذات",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْفِتَنِ مَا ظَهَرَ مِنْهَا وَمَا بَطَنَ",count:3},
  {id:"a12",cat:"الاستعاذات",zekr:"أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ",count:3},
  {id:"a13",cat:"الاستعاذات",zekr:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ أَنْ أَظْلِمَ أَوْ أُظْلَمَ أَوْ أَبْغِي أَوْ يُبْغَى عَلَيَّ أَوْ أَطْغَى أَوْ يُطْغَى عَلَيَّ . اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الشَّكِّ وَالشِّرْكِ الظَّاهِرِ وَالْخَفِيِّ وَالظُّلْمِ وَالْجَوْرِ مِنِّي وَعَلَيَّ",count:1},
  {id:"a14",cat:"الاستعاذات",zekr:"اللَّهُمَّ اجْعَلْنِي مِنْكَ فِي عِيَاذٍ مَنِيعٍ وَحِرْزٍ حَصِينٍ مِنْ جَمِيعِ خَلْقِكَ حَتَّى تُبَلِّغَنِي أَجَلِي مُعَافَىً مِنْ كُلِّ بَلِيَّةٍ فِي دِينِي وَدُنْيَايَ وَبَدَنِي وَأَهْلِي وَأَصْحَابِي وَأَحْبَابِي يَا رَبَّ الْعَالَمِيَن . اللَّهُمَّ أَسْأَلُكَ لِي وَلَهُمْ مِنْ كُلِّ خَيْرٍ سَأَلَكَ مِنْهُ سَيِّدُنَا مُحَمَّدٍ نَبِيُّكَ وَرَسُولُكَ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ وَأَعُوذُ بِكَ مِنْ كُلِّ شَرٍّ اسْتَعَاذَكَ مِنْهُ سَيِّدُنَا مُحَمَّدٌ نَبِيُّكَ وَرَسُولُكَ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ",count:1},
  {id:"a15",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ اجْعَلْ صَلَوَاتَكَ أَبَدَاً وَأَنْمِيَ بَرَكَاتِكَ سَرْمَدَاً وَأَزْكي تَحِيَّاتِكَ فَْلَاً وَعَدَداً عَلَى أَشْرَفِ الْخَلائِقِ الْإِنْسَانِيَّةِ وَمَجْمَعِ الْحَقَائِقِ الْإِيمَانِيَّةِ وَطُورِ التَّجَلِّياتِ الْإِحْسَانِيَّةِ وَمَهْبَطِ الْأَسْرَارِ الرَّحْمَانِيَّةِ وَاسِطَةِ عِقْدِ النَّبِيِّينَ وَمُقَدِّمِ جَيْشِ الْمُرْسَلِينَ وَقَائِدِ رَكْبِ الْأَنْبِيَاءِ الْمُكْرَمِينَ وَأَفْضَلِ الْخَلْقِ أَجْمَعِينَ حامِلِ لِوَاءِ الْعِزِّ الْأَعْلى وَمَالِكِ أَزِمَّةِ الْمَجْدِ الْأَسْنَى شَاهِدِ أَسْرَارِ الْأَزَلِ وَمُشَاهِدِ أَنْوَارِ السَّوَابِقِ الْأَوَّلِ وَتَرْجُمَانِ لِسَانِ الْقِدَمِ وَمَنْبَعِ الْعِلْمِ وَالْحِلْمِ وَالْحِكَمِ مَظْهَرِ سِرِّ الْجُودِ الْجُزْئِيِّ وَالْكُلِّيِّ وَإِنْسَانِ عَيْنِ الْوُجُودِ الْعُلْوِيِّ وَالسُّفْلِيِّ رُوحِ جَسَدِ الْكَوْنَيْنِ وَعَيْنِ حَيَاةِ الدَّارَيْنِ الْمُتَحَقِّقِ بِأَعْلَى رُتَبِ الْعُبودِيَّةِ الْمُتَخَلِّقِ بِأَخَلاقِ الْمَقَامَاتِ الْإِصْطِفَائِيَّةِ الْخَلِيلِ الْأَعْظَمِ وَالْحَبِيبِ الْأَكْرَمِ سَيِّدِنَا مُحَمَّدٍ بِنْ عَبْدِ اللهِ بِنْ عَبْدِ الْمُطَّلِبِ وَعَلَى سَائِرِ الْأَنْبِيَاءِ الْمُرْسَلِينَ وَعَلَى آلِهِمْ وَصَحْبِهِمْ أَجْمَعِينَ.كُلَّما ذَكَرَكَ الذَّاكِرُونَ وَغَفَلَ عَنْ ذِكْرِهِمُ الْغَافِلُونَ",count:1},
  {id:"a16",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا وَمَوْلَانَا مُحَمَّدٍ شَجَرَةِ الْأَصْلِ النُّورَانِيَّةِ وَلَمْعَةِ الْقَبْضَةِ الرَّحْمَانِيَّةِ وَأَفْضَلِ الْخَلِيقَةِ الْإِنْسَانِيَّةِ وَأَشْرَفِ الصُّوَرِ الْجِسْمَانِيَّةِ وَمَعْدِنِ الْأَسِرَارِ الرَّبَّانِيَّةِ وَخَزَائِنِ الْعُلُومِ الْإِصْطِفَائِيَّةِ،صَاحِبِ الْقَبْضَةِ الْأَصْلِيَّةِ وَالْبَهْجَةِ السَّنِيَّةِ وَالرُّتْبَةِ الْعَلِيَّةِ مَنِ انْدَرَجَتِ النَّبِيُّونَ تَحْتَ لِوائِهِ فَهُمْ مِنْهُ وَإِلَيْهِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهِ وَأَصْحَابِهِ عَدَدَ مَاخَلَقْتَ وَرَزَقْتَ وَأَمَتَّ وَأَحْيَيَتَ إِلَى يَوْمِ تَبْعَثُ مَنْ أَفْنَيْتَ وَسَلِّمْ تَسْلِيمَاً كَثِيراً وَالْحَمْدُ للهِ رَبِّ الْعَالَمِينَ،",count:1},
  {id:"a17",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ عَلَى مَنْ مِنْهُ انْشَقَّتِ الْأَسْرَارُ وَانْفَلَقَتِ الْأَنْوَارُ ، وَفِيهِ ارْتَقَتْ الْحَقَائِقُ وَتَنَزَّلَتْ عُلُومُ آدَمَ فَأَعْجَزَ الْخَلَائِقَ وَلَهُ تَضَاءَلَتِ الْفُهُومُ فَلَمْ يُدْرِكُهُ مِنَّا سَابِقٌ وَلَا لَاحِقٌ،فَرِيَاضُ الْمَلَكُوتِ بِزَهْرِ جَمَالِهِ مَونِقَةٌ وَحِيَاضُ الْجَبَرُوتِ بِفَيْضِ أَنْوَارِهِ مُتَدَفِّقَةٌ وَلَا شَيْءَ إِلَّا وَهُوَ بِهِ مَنُوطٌ إِذْ لَوْلَا الْوَاسِطَةُ لَذَهَبَ كَمَا قِيلَ الْمَوْسُوطُ صَلَاةً تَلِيقُ بِكَ مِنْكَ إِلَيْهِ كَمَا هُوَ أَهْلُهُ ، اللَّهُمَّ إِنَّهُ سِرُّكَ الْجَامِعُ الدَّالُّ عَلَيْكَ وَحِجَابُكَ الْأَعْظَمُ الْقَائِمُ لَكَ بَيْنَ يَدَيْكَ ، اللَّهُمَّ أَلْحِقْنِي بِنَسَبِهِ وَحَقِّقْنِي بِحَسَبِهِ وَعَرِّفْنِي إِيَّاهُ مَعْرِفَةً أَسْلَمُ بِهَا مِنْ مَوَارِدِ الْجَهْلِ، وَأَكْرَعُ بِهَا مِنْ مَوَاهِبِ الْفَضْلِ، وَاحْمِلْنِي عَلَى سَبِيلِهِ إِلَى حَضْرَتِكَ حَمْلاً مَحْفُوفاً بِنُصْرَتِكَ ، وَاقْذِفْ بِي عَلَى الْبَاطِلِ فَأَدْمَغُهُ وَزُجَّ بَي فَي بَحَارِ الْأَحَدِيَّةِ ، وَانْشُلْنِي مِنْ أَوْحَالِ التَّوْحِيدِ وَأَغْرِقْنِي فِي عَيْنِ بَحْرِ الْوَحْدَةِ ، حَتَّى لَا أَرَى وَلَا أَسَمَعَ وَلَا أَجِدَ وَلَا أُحِسَّ إِلَّا بِهَا ، وَاجْعَلِ الْحِجَابَ الْأَعْظَمَ حَيَاةَ رُوحِي وَرُوحَهُ سِرَّ حَقِيقَتِي وَحَقِيقَتَهُ جَامِعَ عَوَالِمِي ، بِتَحْقِيقِ الْحَقِّ الْأَوَّلِ يَا أَوَّلُ يَا آخِرُ يَا ظَاهِرُ يَا بَاطِنُ اسْمَعْ نِدَائِي بِمَا سَمِعْتَ بِهِ نِدَاءَ عَبْدِكَ زَكَرِيَّا وَانْصُرْنِي بِكَ لَكَ ، وَأَيِّدْنِي بِكَ لَكَ وَاجْمَعْ بَيْنِي وَبَيْنَكَ وَحُلْ بَيْنِي وَبَيْنَ غَيْرِكَ اللهُ اللهُ اللهُ إِنَّ الَّذِي فَرَضَ عَلَيْكَ الْقُرْآنَ لَرَادُّكَ إِلَى مَعَادٍ ، رَبَّنَا آتِنَا مِنْ لَدُنْكَ رَحْمَةً وَهَيِّءْ لَنَا مِنْ أَمْرِنَا رَشَدَاً ، إِنَّ اللهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيه وَسَلِّمُوا تَسْلِيمَاً ، اللَّهُمَّ صَلِّ عَلَى الذَّاتِ الْمُحَمَّدِيَّةِ اللَّطِيفَةِ الْأَحَدِيَّةِ شَمْسِ سَمَاءِ الْأَسْرَارِ، وَمَظْهَرِ الْأَنْوَارِ، وَمَرْكَزِ مَدَارِ الْجَلَالِ ، وَقُطْبِ فَلَكِ الْجَمَالِ ، اللَّهُمَّ بِسِرِّهِ لَدَيْكَ وَبِسَيْرِهِ إِلَيْكَ آمِنْ خَوْفِي وَأَقِلْ عَثْرَتِي وَأَذْهِبْ حُزْنِي وَحِرْصِي وَكُنْ لِي ، وَخُذْنِي إِلَيْكَ مِنِّي وَارْزُقْنِي الْفَنَاءَ عَنِّي وَلَا تَجْعَلْنِي مَفْتُونَاً بِنَفْسِي مَحْجُوباً بِحِسِّي ، وَاكْشِفْ لِي عَنْ كُلِّ سِرٍّ مَكْتُومٍ يَا حَيُّ يَا قَيُّومُ.",count:1},
  {id:"a18",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَآدَمَ وَنُوحِ وَإِبْرَاهِيمَ وَمُوسَى وَعِيسَى وَمَا بَيْنَهُمْ مِنَ النَّبِيِّينَ وَالْمُرْسَلِينَ صَلَوَاتُ اللهِ وَسَلَامُهُ عَلَيْهِمْ أَجْمَعِينَ.اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا جِبْرِيلَ وَمِيكَائِيلَ وَإِسْرَافِيلَ وَعَزْرَائِيلَ وَحَمَلَةِ الْعَرْشِ وَعَلَى الْمَلَائِكَةِ الْمُقَرَّبِينَ وَعَلَى جَمِيعِ الْأَنْبِياءِ وَالْمُرْسَلِينَ صَلَوَاتُ اللهِ وَسَلَامُهُ عَلَيْهِمْ أَجْمَعِينَ .",count:1},
  {id:"a19",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ بَحْرِ أَنْوَارِكَ وَمَعْدَنِ أَسْرَارِكَ وَلِسَانِ حُجَّتِكَ وَعَرُوسِ مَمْلَكَتِكَ وَإِمَامِ حَضْرَتِكَ وَطِرَازِ مُلْكِكَ وَخَزَائِنِ رَحْمَتِكَ وَطَرِيقِ شَرِيعَتِكَ الْمُتَلَذِّذِ بِتَوْحِيدِكَ إِنْسَانِ عَيْنِ الْوُجُودِ وَالسَّبَبِ فِي كُلِّ مَوْجُودٍ عَيْنِ أَعْيَانِ خَلْقِكَ الْمُتَقَدِّمِ مِنْ نُورِ ضِيَائِكَ صَلَاةً تَدُومُ بِدَوَامِكَ وَتَبْقَى بِبَقَائِكَ لَا مُنْتَهَى لَهَا دُونَ عِلْمِكَ صَلَاةً تُرْضِيكَ وَتُرْضِيهِ وَتَرْضَى بِهَا عَنَّا يَا رَبَّ الْعَالَمِينَ",count:1},
  {id:"a20",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَا فِي عِلْمِ اللهِ صَلَاةً دَائِمَةً بِدَوَامِ مُلْكِ اللهِ",count:3},
  {id:"a21",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ صَلَاةً تُنَجِّينَا بِهَا مِنْ جَمِيعِ الْأَهْوَالِ وَالْآفَاتِ وَتَقْضِي لَنَا بِهَا جَمِيعَ الْحَاجَاتِ، وَتُطَهِّرُنَا بِهَا مِنْ جَمِيعِ السَّيِّئَاتِ وَتَرْفَعُنَا بِهَا أَعْلَى الدَّرَجَاتِ وَتُبَلِّغُنَا بِهَا أَقْصَى الْغَايَاتِ مِْ جَمِيعِ الْخَيْرَاتِ فِي الْحَيَاةِ وَبَعْدَ الْمَمَاتِ",count:11},
  {id:"a22",cat:"الصلوات الدرديرية",zekr:"للَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ صَلَاةَ الرِّضَى وَارْضَ عَنْ أَصْحَابِهِ وعن سيدي أحمد البدوي رِضَاءَ الرِّضَى",count:3},
  {id:"a23",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الرَّؤُوفُ الرَّحِيمُ ذِي الْخُلُقِ الْعَظِيمِ وَعَلَى آلِهِ وَأَصْحَابِهِ وَأَزْوَاجِهِ فِي كُلِّ لَحْظَةٍ عَدَدَ كُلِّ حَادِثٍ وَقَدِيمٍ",count:3},
  {id:"a24",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الْفَاتِحِ لِمَا أُغْلِقَ وَالْخَاتِمِ لِمَا سَبَقَ وَالنَّاصِرِ الْحَقَّ بِالْحَقَّ وَالْهَادِي إِلَى صِرَاطِكَ الْمُسْتَقِيمِ صَلَّى اللهُ عَلَيْهِ وَعَلَى آلِهِ وَأَصْحَابِهِ حَقَّ قَدْرِهِ وَمِقْدَارِهِ الْعَظِيمِ",count:3},

  {id:"a34",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ كَمَا صَلَّيْتَ وَبَارَكْتَ عَلَى سَيِّدِنَا إِبْرَاهِيمَ وَعَلَى آلِ سَيِّدِنَا إِبْرَاهِيمَ فِي الْعَالَمِينَ إِنَّكَ حَمِيدٌ مَجِيدٌ.اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَزْوَاجِهِ أُمَّهَاتِ الْمُؤْمِنِينَ وَعَلَى آلِهِ وَصَحْبِهِ أَجْمَعِينَ .",count:3},
  {id:"a35",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ النَّبِيِّ الْأُمِّيِّ الطَّاهِرِ الْمُطَهِّرِ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّمْ",count:1},
  {id:"a36",cat:"الصلوات الدرديرية",zekr:"للَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ ذِي الْمُعْجِزَاتِ الْبَاهِرَةِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ ذِي الْمَنَاقِبِ الْفَاخِرَةِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي الدُّنْيَا وَالْآخِرَةِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي الدُّنْيَا وَالْآخِرَةِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَخَلقِّنْاَ بِأَخْلَاقِهِ الطَّاهِرَةِ",count:1},
  {id:"a37",cat:"الصلوات الدرديرية",zekr:"للَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَعْطِهِ الْوَسِيلَةَ وَالْفَضِيلَةَ.وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ ذِي الْمَقَامَاتِ الْجَلِيلَةِ،اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَخَلِّقْنَا بِأَخْلَاقِهِ الْجَمِيلَةِ",count:1},
  {id:"a38",cat:"الصلوات الدرديرية",zekr:"وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَهَبْ لَنَا قَلْبَاً شَكُورَاً ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاجْعَلْ سَعْيَنا مَشْكُورَاً،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَلَقِّنَا نَضْرَةً وَسُرُورَاً،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَلْقِ عَلَيْنَا مِنْكَ مَحَبَّةً وَنُوراً ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَهَبْ لَنَا سِرَّاً بِالْأَسْرَارِ مَسْرُورَاً",count:1},
  {id:"a39",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ الصَّادِقِ الْأَمِين ، وَصَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي جَاءَ بِالْحَقِّ الْمُبِينِ،وَصَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي أَرْسَلْتَهُ رَحْمَةً لِلْعَالَمِينَ ، وَصَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى جَمِيعِ الْأَنْبِيَاءِ وَالْمُرْسَلِينَ وَعَلَى آلِهِمْ وَصَحْبِهِمْ أَجْمَعِينَ كُلَّمَا ذَكَرَكَ الذَّاكِرُونَ وَغَفَلَ عَنْ ذِكْرِهِمُ الْغَافِلُونَ",count:1},
  {id:"a40",cat:"الصلوات الدرديرية",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى سَائِرِ أَنْبِيَائِكَ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى مَلَائِكَتِكَ وَأَوْلِيَائِكَ مِنْ أَهْلِ أَرْضِكَ وَسَمَائِكَ عَدَدَ مَا كَانَ وَعَدَدَ مَا يَكُونُ وَعَدَدَ مَا هُوَ كَائِنٌ فِي عِلْمِ اللهِ أَبَدَ الْآبِدِينَ وَدَهْرَ الدَّاهِرِينَ وَاجْعَلْنَا بِالصَّلَاةِ عَلَيْهِمْ مِنَ الصِّدِّيقِينَ الْآمِنِينَ يَا رَبَّ الْعَالَمِينَ .",count:1},
  {id:"a41",cat:"حرف الهمزة",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَا فِي الْأَرْضِ وَالسَّمَاءِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى جَمِيعِ الْمَلَائِكَةِ وَالْأَنْبِيَاءِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَعَلَى سَائِرِ الْعُلَمَاءِ وَالْأَوْلِيَاءِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ صَلَاةً تَمْلَأُ سَائِرَ الْأَقْطَارْ وَالْأَرْجَاءِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَحَقِّقْنَا بِحَقَائِقِ الصِّفَاتِ وَالْأَسْمَاءِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَاجْعَلْنَا مَعَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ مِنَ النَّبِيِّينَ وَالصِّدِّيقِينَ وَالشُّهَدَاءِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلى آلِهِ صَلَاةً تَقِينَا بِهَا شَرَّ الْحُسَّادِ وَالْأَعْدَاءِ",count:1},
  {id:"a42",cat:"حرف الباء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ النَّاطِقِ بِالصِّدْقِ وَالصَّوَابِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ أَفْضَلَ مَنْ أُوتِيَ الْحِكْمَةَ وَفَصْلَ الْخِطَابِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ بَابِ الْأَبْوَابِ وَلُبَابِ اللُّبَابِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَزِلْ عَنْ قُلُوبِنَا بِنُورِهِ ظُلْمَةَ الْحِجَابِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَلْهِمْنَا الْحِكْمَةَ وَالصَّوَابَ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاسْقِنَا مِنْ لَدُنْكَ صَافِيَ الشَّرَابِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَفَهِّمْنَا أَسْرَارَ الْكِتَابِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاجْعَلْنَا بِالصَّلَاةِ عَلَيْهِ مِنَ الْأَنْجَابِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَدْخِلْنَا حَضِيرَةَ الْقُدْسِ فِي جُمْلَةِ الْأَحْبَابِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى سَائِرِ الْأَنْبِيَاءِ وَالْأَصْفِيَاءِ وَالْآلِ وَالْأَصْحَابِ",count:1},
  {id:"a43",cat:"حرف التاء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي جَاءَ بِالْآيَاتِ البَيِّنَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الْمُؤَيَّدِ بِجَلَائِلِ الْمُعْجِزَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الْقَائِلِ إِنِّمَا الْأَعْمَالُ بِالنِّيَّاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ السَّاِري سِرُّهُ فِي سَائِرِ الْكَائِنَاتِ،وَصَلِّ وَسَلَّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَكَفِّرْ بِها عَنَّا السَّيِّئَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَيِّدْنَا بِالْكَرَامَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سيِّدِنَا مُحَمَّدٍ وَجَمِّلْنَا بِجَمِيلِ الصِّفَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَزِلْ مِنْ قُلُوبِنَا حُبَّ الرِّيَاسَةِ وَجَمِيعِ الشَّهَوَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سيِّدِنَا مُحَمَّدٍ وَأَنْعِمْ عَلَيْنَا بِتَجَلِّي الْأَسْمَاءِ وَالصِّفَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَغْرِقْنَا فِي عَيْنِ بَحْرِ الْوِحْدَةِ السَّارِيَةِ فِي جَمِيعِ الْمَوْجَودَاتِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَبْقِنَا بِكَ لَا بِنَا فِي جَمِيعِ اللَّحَظَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَانْشُرْ عَلَيْنَا نِعْمَتَكَ الْمَخْصُوصَةَ بِأَهْلِ الْعِنَايَاتِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَذِقْنَا لَذَّةَ تَجَلِّي الذَّاتِ وَأَدِمْهَا عَلَيْنَا مَا دَامَتْ الْأَرْضُ وَالسَّمَاوَاتِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَصَحَابَتِهِ وَعَلَى كُلِّ مَنْ صَدَقَ بِرِسَالَتِهِ وَالْطُفْ بِنَا وَبِوَالِدَيْنَا وَبِسَائِرِ الْمُسْلِمِينَ وَالْمُسْلِمَاتِ فِي الْحَيِاةِ وَبَعْدَ الْمَمَاتِ",count:1},
  {id:"a44",cat:"حرف الثاء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ كُلِّ قَدِيمٍ وَحَادِثٍ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ صَلَاةً يَعُمُّ نُورُهَا جَمِيعَ الْحَوَادِثِ ، وَصَلِّ وَسَلِّمْ وَبَارِْك عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ مَا صَدَقَ صَادِقٍ وَنَكَثَ نَاكِثٌ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَاكْفِنَا شَرَّ الْحَوَادِثِ",count:1},
  {id:"a45",cat:"حرف الجيم",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الْمَخْصُوصِ بِالْإِسْرَاءِ وَالْمِعْرَاج ِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَتَوِّجْنَا مِنَ الْقَبُولِ أَبْهَجَ تَاجٍ صَلَّى اللهُ عَلَيْهِ وَعَلَى آلِهِ وَأَصْحَابِهِ الْمَحْفُوظِينَ مِنَ الْإِعْوِجَاجِ",count:1},
  {id:"a46",cat:"حرف الحاء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ زَيْنِ الْمِلَاحِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ مَعْدِنِ الْجُودِ وَالسَّمَاحِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ مَا تَعَاقَبَ الْغُدُوُّ وَالرَّوَاحُ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ إِمَامِ أَهْلِ حَضْرَةِ الْكَرِيمِ الْفَتَّاحِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاجْعَلْنَا بِالصَّلَاةِ عَلَيْهِ مِنْ أَهْلِ الْفَوْزِ وَالْفَلَاحِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ أُولِي الْفَضْلِ وَالرَّبَاحِ .",count:1},
  {id:"a47",cat:"حرف الخاء",zekr:"اللَّهُمَّ صَلِّ وَسَلَّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي بِسِرِّهِ اسْتَقَامَتْ الْبَرَازِخُ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ كُلِّ مَنْسُوخٍ وَنَاسِخٍ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَمِّرْ قُلُوبَنَا بِالنُّورِ الرَّاسِخِ ، صَلَّى اللهُ عَلَيْهِ وَعَلَى أَلِهِ وَأَصْحَابِهِ الَّذِينَ هُمْ فِي مَحَبَّتِهِ كَالْجِبَالِ الرَّوَاسِخِ",count:1},
  {id:"a48",cat:"حرف الدال",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ أَشْرَفِ دَاعٍ إِلَى اللهِ وَهَادٍ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاسْلُكْ بِنَا طَرِيقَ الرَّشَادِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاخْلَعْ عَلَيْنَا خِلَعَ الرُّضْوَانِ وَالْوِدَادِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَتَوِّجْنَا بِتَاجِ الْقَبُولِ بَيْنَ الْعِبَادِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَارْأَفْ بِنَا رَأْفَةَ الْحَبِيبِ بِحَبِيبِهِ يَوْمَ التَّنَادِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَانْشُرْ طَرِيقَتَنَا فِي سَائِرِ الْبِلَادِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيَّدِنَا مُحَمَّدٍ وَعَمِّرْ بِسَوَاطِعِ أَنْوَارِهَا كُلَّ مَنِ اشْتَغَلَ بِهَا مِنْ كُلِّ حَاضِرٍ وَبَادٍ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَقِنَا شَرَّ الْحُسَّادِ وَأَهْلِ الْبَغْيِ وَالْعِنَادِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَقِنَا شَرَّ الْحُسَّادِ وَأَهْلِ الْبَغْيِ وَالْعِنَادِ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مًحَمَّدٍ وَأَصْلِحْ وُلَاةَ أُمُورِنَا بِالْعَدْلِ وَالسَّدَادِ،وصَلِّ وَسَلِّمْ وَبَارِكْ عَلَيْهِ وَعَلَى آلِهِ وَأَصْحَابِهِ ذَوِي الْفَضْلِ وَالْإِمْدَادِ",count:1},
  {id:"a49",cat:"حرف الذال",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ أُسْتَاذِ كُلِّ أُسْتَاذٍ،وَصَلِّ وَسَلٍّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ مَلَاذِ كُلِّ مَلَاذٍ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ وَأَعِذْنَا مِنْ كُلِّ مَا مِنْهُ اسْتِعَاذَ .",count:1},
  {id:"a50",cat:"حرف الراء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ مَعْدِنِ الْأَسْرَارِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ مُظْهِرِ الْأَنْوَارِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَا أَظْلَمَ عَلَيْهِ الْلَّيْلُ وَأَضَاءَ عَلَيْهِ النَّهَار ُ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَقِنَا عَذَابَ النَّارِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ السَّادَةِ الْأَخْيَار",count:1},
  {id:"a51",cat:"حرف الزاي",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي تَشَرَّفَتْ بِهِ أَرْضُ الْحِجَازِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي مَنِ اتَّبَعَهُ فَقَدْ فَازَ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَاكْشِفْ لَنَا عَنْ أَسْرَارِ الْمَنْعِ وَالْجَوَازِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الْمُخْتَصِّينَ بِحُسْنِ الْمَفَازْ",count:1},
  {id:"a52",cat:"حرف السين",zekr:"للَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ طَيِّبِ الْأَنْفَاسِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَابْسُطْ لَنَا الرِّزْقَ وَاغْنِنَا عَنِ النَّاسِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَطَهِّرْنَا مِنَ الْأَدْنَاسِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الَّذِينَ أَزَلْتَ عَنْهُمُ الْالْتِبَاسِ",count:1},
  {id:"a53",cat:"حرف الشين",zekr:"للَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي لَمْ يَرْضَ بِلِينِ الْفِرَاشِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي كَانَ مِنْ خُلُقِهِ الْبَشَاشُ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مًحَمَّدٍ الَّذِي تَبَرَّأَ مِنَ الْغَاشِّ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَارْزُقْنَا بِبَرَكَتِهِ طَيِّبَ الْمَعَاشِ",count:1},
  {id:"a54",cat:"حرف الصاد",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الْآمِرِ بِالتَّقْوَى وَالْإِخْلَاصِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَاجْعَلْنَا بِالصَّلَاةِ عَلَيْهِ مِنْ عِبَادِكَ الْخَوَاصِّ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ أُولِي الْقُرْبِ وَالْاخْتِصَاصِ .",count:1},
  {id:"a55",cat:"حرف الضاد",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الَّذِي أَزْهَرَتْ بِبَرَكَتِه الرِّيَاضُ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَاحِبِ الْمَدَدِ الْفَيَّاضِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الَّذِي أَعْرَضَ عَمَّا سِوَى اللهِ كُلَّ الْإِعْرَاضِ وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَانْزَعْ مِنْ قُلُوبِنَا حُبَّ الشَّهَوَاتِ وَالْأَغْرَاضِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الْمُطَهَّرَةِ قُلُوبُهُمْ مِنَ الْأَمْرَاضِ .",count:1},
  {id:"a56",cat:"حرف الطاء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الْهَادِي إِلَى سَواءِ الصِّرَاطِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الْآمِر بِالْعَدْلِ وَالنَّاهِي عَنِ التَّفْرِيطِ وَالْإِفْرَاطِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَسَلِّمْنَا بِبَرَكَتِهِ مِنَ الْانْحِطَاطْ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الَّذِينَ رَبَطُوا قُلُوبَهُمْ بِمَحَبَّتِهِ كُلَّ الْارْتِبَاطِ",count:1},
  {id:"a57",cat:"حرف الظاء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ عَدَدَ كُلِّ مَحْفُوظٍ وَحَافِظٍ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ عَدَدَ كُلِّ مَوْعُوظٍ وَوَاعِظٍ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الَّذِينَ اتَّعَظُوا مِنْهُ بِجَمِيلِ الْمَوَاعِظِ",count:1},
  {id:"a58",cat:"حرف العين",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ النُّورِ السَّاطِعِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي تَلْتَذُ بِحَدِيثِهِ الْمَسَامِعُ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ الَّذِي هُوَ لِكُلِّ خَيْرٍ جَامِعٍ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَأَزِلْ عَنْ قُلُوبِنَا الْبَرَاقِعَ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الَّذِينَ كَانَ مَجْمَعُهُمْ خَيْرُ الْمَجَامِعِ .",count:1},
  {id:"a59",cat:"حرف الغين",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَاحِبِ الرِّسَالَةِ وَالْبَلَاغِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَلَاةً تَمٍلَأُ السَّمَاوَاتِ وَالْفَرَاغِ",count:1},
  {id:"a60",cat:"حرف الفاء",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الْآمِرِ بِالْعَدْلِ وَالْإِنْصَافِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ النَّاهِي عَنِ التَّبْذِيرِ وَالْإِسْرَافِ . وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الْبَحْرِ الْخِضَمِّ الَّذِي مِنْهُ الْاغْتِرَافُ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَأَسْعِفْنَا بِهِ كُلَّ الْإِسْعَافِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلضى آلِهِ وَأَصْحَابِهِ الَّذِينَ ارْتَشَفُوا مِنْ فَيْضِ نُورِهِ جَمِيلَ الْارْتِشَافِ",count:1},
  {id:"a61",cat:"حرف القاف",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ خَيْرِ خَلْقِ اللهِ عَلَى الْإِطْلَاقِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَلَاةً تُزِيلُ بِهَا عَنَّا الْوَهْمَ وَالنِّفَاقَ،وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ صَلَاةُ تُدْخِلُنَا بِهَا حَضْرَةَ الْإِطْلَاقِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وِأَصْحَابِهِ أُولِي الْبَأْسِ الشَّدِيدِ عِنْدَ التَّلَاق ِ",count:1},
  {id:"a62",cat:"حرف الكاف",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ مَا تَحَرَّكَتِ الْأَفْلَاكُ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ عَدَدَ تَسْبِيحِ الْأَمْلَاكِ",count:1},
  {id:"a63",cat:"حرف اللام",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ بَطَلَ الْأَبْطَالِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ مَعْدِنِ الْجُودِ وَالنَّوَالِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَأَذِقْنَا لَذَّةَ الْوِصَالِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ كَمَلَةِ الرِّجَالِ",count:1},
  {id:"a64",cat:"حرف الميم",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ السَّيِّدِ الْهُمَامِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ أَفْضَلِ الرُّسُلِ الْكِرَامِ عَلَيْهِ وَعَلَيْهِمْ أَفْضَلُ الصَّلَاةِ وَالسَّلَامِ عَلَى مَرِّ اللَّيَالِي وَالْأَيَّامِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَلَاةً تُنَجِّينَا بِهَا مِنَ الشُّكُوكِ وَالْأَوْهَامِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الْأَئِمَّةِ الْأَعْلَام ِ.",count:1},
  {id:"a65",cat:"حرف النون",zekr:"اللَّهُمَّ صَل وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ سَيِّدِ الْأَكْوَانِ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَلَاةً تَمْلَأُ الْأَمْكِنَةَ وَالْأَزْمَانَ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ صَلَاةً نَرْتَقِي بِهَا إِلَى مَقَامِ الْمَعْرِفَةِ وَالْإِحْسَانِ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ الْأَئِمَّةِ الْأَعْيَان ِ",count:1},
  {id:"a66",cat:"حرف الهاء",zekr:"اللهم صل وسلم وبارك على سيدنا محمد العالي القدر العظيم الجاه، وصل وسلم وبارك على سيدنا محمد وعلى آل سيدنا محمد وأطلعنا على أسرار لا إله إلا الله",count:1},
  {id:"a67",cat:"حرف الواو",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الَّذِي مَا نَطَقَ عَنِ الْهَوَى، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ الَّذِي مَا ضَلَّ عَنِ الْحَقِّ وَمَا غَوَى، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَأَلْبِسْنَا بِالصَّلَاةِ عَلَيْهِ لِبَاسَ التَّقْوَى، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَطَهِّرْنَا بِهَا مِنَ الشَّكْوَى وَالدَّعْوَى، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَكُفَّ بِهَا عَنَّا الْأَسْوَاءَ وَالْبَلْوَى، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَالْطُفْ بِنَا بِبَرَكَتِهَا فِي السِّرِ وَالنَّجْوَى .",count:1},
  {id:"a68",cat:"حرف اللام ألف",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ ذِي الْمَقَامِ الْأَعْلَى وَالسِّرِّ الْأَجْلَى ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي الْخَلَا وَالْمَلَا، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ سَيِّدِ أَهْلِ الْعُلَا ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِ سَيِّدِنَا مُحَمَّدٍ وَاكْشِفْ لَنَا عَنْ مَقَامَاتِ الْوِلَاءِ وَالْاسْتِجْلَاءِ",count:1},
  {id:"a69",cat:"حرف الياء",zekr:"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى كُلِّ نَبِيٍّ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى كُلِّ مَلَكٍ وَوَلِيٍّ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى كُلِّ عَالِمٍ وَتَقِيٍّ ، وَصَلِّ وَسَلِّمْ وَبَارِكْ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَأَصْحَابِهِ وَأَتْبَاعِهِ وَعَلَى سَائِرِ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ وَالْمُسْلِمِينَ وَالْمُسْلِمَاتِ الْأَحْيَاءِ مِنْهُمْ وَالْأَمْوَاتِ وَتَابِعْ بَيْنَنَا وَبَيْنَهُمْ بِالْخَيْرَاتِ وَالْبَرَكَاتِ إِنَّكَ قَرِيبٌ مُجِيبُ الدَّعَوَاتِ يَا رَبَّ الْعَالَمِينَ ، اللَّهُمَّ اجْعَلْ خَيْرَ أَعْمَالِنَا خَوَاتِيمَهَا ، وَخَيْرَ أَيَّامِنَا يَوْمَ لِقَائِكَ ، رَبَّنَا أَتْمِمْ لَنَا نُورَنَا وَاغْفِرْ لَنَا إِنَّكَ عَلَى كُلِّ شَيْءٍ قَدِيرٍ، رَبَّنَا آمَّنَا بِمَا أَنْزَلْتَ وَاتَّبَعْنَا الرَّسُولَ فَاكْتُبْنَا مَعَ الشَّاهِدِينَ",count:1},
  {id:"a70",cat:"الدعاء",zekr:"اللَّهُمَّ اغْفِرْ لَنَا مَا قَدَّمْنَا وَمَا أَخَّرْنَا وَمَا أَسْرَرْنَا وَمَا أَعْلَنَّا وَمَا أَنْتَ أَعْلَمُ بِهِ مِنَّا. اللَّهُمَّ أَرِنَا الْحَقَّ حَقَّاً فَنَتَّبِعَهُ ، وَأَرِنَا الْبَاطِلَ بَاطِلَاً فَنَجْتَنِبَهُ بِرَحْمَتِكَ يَا أَرْحَمَ الرَّاحِمِينَ. اللَّهُمَّ اكْفِنَا بِحَلَالِكَ عَنْ حَرَامِكَ، وَاغْنِنَا بِفَضْلِكَ عَمَّنْ سِوَاكَ.اللَّهُمَّ يَسِّرْ لَنَا أُمُورَنَا مَعَ الرَّاحَةِ لِقُلُوبِنَا وَأَبْدَانِنَا وَالسَّلَامَةِ وَالْعَافِيَةِ فِي دِينِنَا وَدُنْيَانَا وَآخِرَتِنَا إِنَّكَ عَلَى كُلِّ شَيْءٍ قَدِيرُ . اللَّهُمَّ ارْزُقْنَا حُسْنَ التَّوَكُّلِ عَلَيْكَ، وَدَوَامَ الْإِقْبَالِ عَلَيْكَ ، وَاكْفِنَا شَرَّ وَسَاوِسِ الشَّيْطَانِ ، وَقِنَا شَرَّ الْإِنْسِ وَالْجَانِ ، وَاخْلَعْ عَلَيْنَا خِلَعَ الرِّضْوَانِ ، وَهَبْ لَنَا حَقِيقَةَ الْإِيمَان ِ، وَتَوَلَّ قَبْضَ أَرْوَاحِنَا عِنْدَ انْتِهَاءِ الْأَجَلِ بِيَدِكَ مَعَ شِدَّةِ الشَّوْقِ إِلَى لِقَائِكَ يَا رَحْمَنُ. اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمَاً نَافِعَاً، وَقَلْبَاً خَاشِعَاً ، وَنُورَاً سَاطِعَا ً، وَرِزْقَاً وَاسِعَاً وَشِفَاءً مِنْ كُلِّ دَاءٍ، وَنَسْأَلُكَ الْغِنَى عَنِ النَّاسِ . رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ أَمْرِي وَاحْلُلْ عُقْدَةً مِنْ لِسَانِي يَفْقَهُوا قَوْلِي. رَبِّ أَوْزِعْنِي أَنْ أَشْكُرَ نِعْمَتَكَ الَّتِي أَنْعَمْتَ عَلَيَّ وَعَلَى وَالِدَيَّ وَأَنْ أَعْمَلَ صَالِحَاً تَرْضَاهُ، وَأَدْخِلْنِي بِرَحْمَتِكَ فِي عِبَادِكَ الصَّالِحِينَ. رَبِّ اغْفِرْ وِارْحَمْ وَأَنْتَ خَيْرُ الرَّاحِمِينَ",count:1},
  {id:"a71",cat:"الخاتمه",zekr:"سُبْحَانَ رَبِّكَ رَبِّ الْعِزَّةِ عَمَّا يَصِفُونَ وَسَلَامٌ عَلَى الْمُرْسَلِينَ وَالْحَمْدُ للهِ رَبِّ الْعَالَمِينَ",count:1},
  {id:"a72",cat:"الخاتمه",zekr:"اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي الْأَوَّلِينَ وَصَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي الْآخِرِينَ وَصَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ وَقْتٍ وَحِينٍ وَصَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي الْمَلَا الْأَعْلَى إِلَى يَوْمِ الدِّينِ وَصَلِّ وَسَلِّمْ عَلَى جَمِيعِ الْأَنْبِيَاءِ وَالْمُرْسَلِينَ وَعَلَى الْمَلَائِكَةِ الْمُقَرَّبِينَ، وَعَلَى عِبَادِ اللَّهِ الصَّالِحِينَ، مِنْ أَهْلِ السَّمَاوَاتِ وَأَهْلِ الْأَرْضِينَ وَرَضِيَ اللَّهُ تَبَارَكَ وَتَعَالَى عَنْ سَادَاتِنَا ذَوِي الْقَدْرِ الْجَلِيِّ أَبِي بَكْرٍ وَعُمَرَ وَعُثْمَانَ وَعَلِيٍّ وَعَنْ سَائِرِ أَصْحَابِ رَسُولِ اللَّهِ أَجْمَعِينَ وَعَنِ التَّابِعِينَ لَهُمْ بِإِحْسَانٍ إِلَى يَوْمِ الدِّينِ وَاحْشُرْنَا وَارْحَمْنَا مَعَهُمْ بِرَحْمَتِكَ يَا أَرْحَمَ الرَّاحِمِينَ يَا اللَّهُ يَا حَيُّ يَا قَيُّومُ لَا إِلَهَ إِلَّا أَنْتَ يَا اللَّهُ  يَا رَبَّنَا يَا وَاسِعَ الْمَغْفِرَةِ يَا أَرْحَمَ الرَّاحِمِينَ، اللَّهُمَّ آمِينَ.",count:1},

];

// ---- STATE ----
let counters = {}, likes = {}, calMonth = new Date(), currentCat = null;
const TODAY = new Date().toISOString().slice(0,10);

function loadState(){
  try{ counters = JSON.parse(localStorage.getItem('az_counters')||'{}'); }catch(e){}
  try{ likes = JSON.parse(localStorage.getItem('az_likes')||'{}'); }catch(e){}
}
function save(){ localStorage.setItem('az_counters',JSON.stringify(counters)); }
function saveLikes(){ localStorage.setItem('az_likes',JSON.stringify(likes)); }

function getHistory(){
  try{ return JSON.parse(localStorage.getItem('az_history')||'{}'); }catch(e){ return {}; }
}
function saveHistory(h){ localStorage.setItem('az_history',JSON.stringify(h)); }

function recordToday(){
  const h = getHistory();
  const done = DATA.filter(d=>(counters[d.id]||0)>=d.count).length;
  const pct = Math.round((done/DATA.length)*100);
  h[TODAY] = pct;
  saveHistory(h);
}

// ---- PAGES ----
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='feed') renderFeed();
  if(name==='cal') renderCal();
}

// ---- COUNTER ----
const categories = [...new Set(DATA.map(d=>d.cat))];

function buildTabs(){
  const el = document.getElementById('tabs');
  const all = document.createElement('button');
  all.className='tab-btn active'; all.textContent='الكل';
  all.onclick=()=>selectCat(null,all);
  el.appendChild(all);
  categories.forEach(c=>{
    const b=document.createElement('button');
    b.className='tab-btn'; b.textContent=c;
    b.onclick=()=>selectCat(c,b);
    el.appendChild(b);
  });
}

function selectCat(c,btn){
  currentCat=c;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  renderCards();
}

function renderCards(){
  const con=document.getElementById('cards'); con.innerHTML='';
  const filtered=currentCat?DATA.filter(d=>d.cat===currentCat):DATA;
  let lastCat=null;
  filtered.forEach((item,idx)=>{
    if(item.cat!==lastCat&&!currentCat){
      const h=document.createElement('div'); h.className='cat-hdr';
      h.innerHTML=`<div class="cat-name">✦ ${item.cat} ✦</div><div class="cat-line"></div>`;
      con.appendChild(h); lastCat=item.cat;
    }
    const cur=counters[item.id]||0, done=cur>=item.count;
    const times=item.count===1?'مرة واحدة':item.count===3?'ثلاث مرات':item.count+' مرات';
    const card=document.createElement('div');
    card.className='card'+(done?' done':''); card.id='card_'+item.id;
    card.style.animationDelay=(idx*0.03)+'s';
    card.innerHTML=`<div class="card-body"><div class="zikr-txt">${item.zekr}</div></div>
    <div class="card-foot">
      <div class="cnt-info">${times} &nbsp;|&nbsp; <span id="ci_${item.id}">${cur}/${item.count}</span></div>
      <div class="counter-area">
        <div class="done-badge">✓ تم</div>
        <div class="cnt-disp" id="cd_${item.id}">${cur}</div>
        <button class="cnt-btn${done?' done-btn':''}" id="cb_${item.id}" onclick="tap('${item.id}',this)">
          ${done?'✓':'+'}
        </button>
      </div>
    </div>`;
    con.appendChild(card);
  });
  updateStats();
}

function tap(id,btn){
  const item=DATA.find(d=>d.id===id); if(!item) return;
  const cur=counters[id]||0; if(cur>=item.count) return;
  const r=document.createElement('div'); r.className='ripple';
  btn.appendChild(r); setTimeout(()=>r.remove(),500);
  counters[id]=cur+1; save();
  const nc=counters[id], done=nc>=item.count;
  document.getElementById('cd_'+id).textContent=nc;
  const times=item.count===1?'مرة واحدة':item.count===3?'ثلاث مرات':item.count+' مرات';
  document.getElementById('ci_'+id).textContent=nc+'/'+item.count;
  if(done){
    btn.classList.add('done-btn'); btn.textContent='✓';
    const card=document.getElementById('card_'+id);
    card.classList.add('done','pop');
    setTimeout(()=>card.classList.remove('pop'),350);
    if(navigator.vibrate) navigator.vibrate(30);
  }
  updateStats(); recordToday();
}

function updateStats(){
  const total=DATA.length, done=DATA.filter(d=>(counters[d.id]||0)>=d.count).length;
  const pct=Math.round((done/total)*100);
  document.getElementById('stxt').textContent=`${done} من ${total} ذكر (${pct}%)`;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('allDone').classList.toggle('show',done===total);
}

function resetAll(){
  if(!confirm('إعادة تعيين جميع الأذكار؟')) return;
  counters={}; save(); renderCards();
}

// ---- FEED ----
function renderFeed(){
  const con=document.getElementById('feed'); con.innerHTML='';
  DATA.forEach(item=>{
    const liked=likes[item.id]||false;
    const likeCount=parseInt(localStorage.getItem('lc_'+item.id)||Math.floor(Math.random()*20+1));
    const div=document.createElement('div'); div.className='feed-card';
    div.innerHTML=`
    <div class="feed-head">
      <div class="feed-avatar">🌿</div>
      <div class="feed-meta">
        <div class="feed-cat">${item.cat}</div>
        <div class="feed-time">${item.count===1?'مرة واحدة':item.count+' مرات'}</div>
      </div>
    </div>
    <div class="feed-body"><div class="feed-txt">${item.zekr}</div></div>
    <div class="feed-actions">
      <button class="feed-btn${liked?' liked':''}" id="lb_${item.id}" onclick="toggleLike('${item.id}',this)">
        <span class="feed-icon">${liked?'❤️':'🤍'}</span>
        <span id="lc_${item.id}">${likeCount}</span>
      </button>
      <button class="feed-btn" onclick="copyZikr('${item.id}',this)">
        <span>📋</span> نسخ
      </button>
      <button class="feed-btn" onclick="shareZikr('${item.id}')">
        <span>📤</span> مشاركة
      </button>
      <div style="flex:1"></div>
      <div class="feed-count-badge">${(counters[item.id]||0)}/${item.count}</div>
    </div>`;
    con.appendChild(div);
  });
}

function toggleLike(id,btn){
  likes[id]=!likes[id]; saveLikes();
  const lc=parseInt(document.getElementById('lc_'+id).textContent);
  document.getElementById('lc_'+id).textContent=likes[id]?lc+1:Math.max(0,lc-1);
  localStorage.setItem('lc_'+id,parseInt(document.getElementById('lc_'+id).textContent));
  btn.classList.toggle('liked',likes[id]);
  btn.querySelector('.feed-icon').textContent=likes[id]?'❤️':'🤍';
}

function copyZikr(id,btn){
  const item=DATA.find(d=>d.id===id);
  navigator.clipboard.writeText(item.zekr).then(()=>{
    btn.innerHTML='<span>✅</span> تم النسخ';
    setTimeout(()=>{ btn.innerHTML='<span>📋</span> نسخ'; },1500);
  });
}

function shareZikr(id){
  const item=DATA.find(d=>d.id===id);
  if(navigator.share){ navigator.share({text:item.zekr}); }
  else{ navigator.clipboard.writeText(item.zekr); alert('تم النسخ للمشاركة'); }
}

// ---- CALENDAR ----
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function changeMonth(d){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+d,1); renderCal(); }

function renderCal(){
  const h=getHistory(), y=calMonth.getFullYear(), m=calMonth.getMonth();
  document.getElementById('calTitle').textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const todayD=new Date(), isCurrentMonth=(todayD.getFullYear()===y&&todayD.getMonth()===m);
  const con=document.getElementById('calDays'); con.innerHTML='';
  for(let i=0;i<first;i++){ const e=document.createElement('div'); e.className='cal-day empty'; con.appendChild(e); }
  for(let d=1;d<=days;d++){
    const dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const pct=h[dateStr]||0;
    const el=document.createElement('div'); el.className='cal-day';
    if(pct>=100) el.classList.add('completed');
    else if(pct>0) el.classList.add('partial');
    else if(isCurrentMonth&&d>todayD.getDate()) el.classList.add('future');
    if(isCurrentMonth&&d===todayD.getDate()) el.classList.add('today');
    el.textContent=d;
    if(pct>0) el.title=pct+'% مكتمل';
    con.appendChild(el);
  }
  calcStreaks(h);
}

function calcStreaks(h){
  const keys=Object.keys(h).sort();
  let streak=0, best=0, total=0, cur=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if(h[k]>=100){ if(i===0||cur>0){cur++;best=Math.max(best,cur);} }
    else{ if(i===0) break; cur=0; }
  }
  streak=cur;
  total=keys.filter(k=>h[k]>=100).length;
  let b2=0,tmp=0;
  keys.forEach(k=>{ if(h[k]>=100){tmp++;b2=Math.max(b2,tmp);}else tmp=0; });
  document.getElementById('streak').textContent=streak;
  document.getElementById('totalDays').textContent=total;
  document.getElementById('bestStreak').textContent=b2;
}

// ---- INIT ----
loadState(); buildTabs(); renderCards(); recordToday();
</script>
